<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | LMS</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <link rel="stylesheet" th:href="@{/css/user-dashboard.css}">
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 11.5px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #e8e6df;
            border-radius: 30px;
            font-size: 13.5px;
            outline: none;
            transition: border-color 0.2s ease;
            background: #ffffff;
            color: #1a1a1a;
        }
        .form-group input:focus {
            border-color: #1a1a1a;
        }
        .form-group input:disabled {
            background: #faf9f6;
            cursor: not-allowed;
            color: #9ca3af;
        }
    </style>
</head>
<body class="dashboard-body">

    <!-- App Window Wrapper -->
    <div class="db-window">

        <!-- ── Sidebar Overlay (mobile) ── -->
        <div class="db-overlay" id="dbOverlay" onclick="toggleSidebar()"></div>

        <!-- ══════════════════════════════
             LEFT ICON SIDEBAR
        ══════════════════════════════ -->
        <aside class="db-sidebar" id="dbSidebar">
            <!-- Sidebar Header / Toggle -->
            <div class="db-sidebar-header">
                <div class="db-logo-container" onclick="location.href='/user'">
                    <div class="db-logo">
                        <img th:src="@{/images/logo.png}" alt="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <span class="db-logo-fallback" style="display:none;"><i class="fa-solid fa-book-open-reader"></i></span>
                    </div>
                    <span class="db-logo-text">LMS <span>User</span></span>
                </div>
                <button class="db-sidebar-toggle-btn" id="dbSidebarToggle" onclick="toggleSidebarSize(event)" aria-label="Toggle Sidebar Size">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <!-- Nav icons -->
            <nav class="db-nav">
                <a th:href="@{/user}" class="db-nav-item" data-tip="Dashboard">
                    <i class="fa-solid fa-house"></i>
                    <span class="db-nav-text">Dashboard</span>
                </a>
                <a th:href="@{/user/books}" class="db-nav-item" data-tip="Browse Books">
                    <i class="fa-solid fa-book"></i>
                    <span class="db-nav-text">Browse Books</span>
                </a>
                <a th:href="@{/user/my-books}" class="db-nav-item" data-tip="My Books">
                    <i class="fa-solid fa-book-open-reader"></i>
                    <span class="db-nav-text">My Books</span>
                </a>
                <a th:href="@{/user/requests}" class="db-nav-item" data-tip="Requests">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span class="db-nav-text">Requests</span>
                </a>
                <a th:href="@{/user/fines}" class="db-nav-item" data-tip="Fines">
                    <i class="fa-solid fa-indian-rupee-sign"></i>
                    <span class="db-nav-text">Fines</span>
                </a>
            </nav>

            <!-- Bottom icons -->
            <div class="db-nav-bottom">
                <a th:href="@{/user/settings}" class="db-nav-item active" data-tip="Settings">
                    <i class="fa-solid fa-gear"></i>
                    <span class="db-nav-text">Settings</span>
                </a>
                <a th:href="@{/logout}" class="db-nav-item db-logout" data-tip="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="db-nav-text">Logout</span>
                </a>
            </div>
        </aside>

        <!-- ══════════════════════════════
             MAIN CONTENT
        ══════════════════════════════ -->
        <main class="db-main" id="dbMain">

            <!-- ── Mobile Top Bar ── -->
            <header class="db-mobile-header">
                <button class="db-hamburger" id="dbHamburger" onclick="toggleSidebar()" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
                <span class="db-mobile-logo">Book<span>Base</span></span>
                <div class="db-mobile-right">
                    <a th:href="@{/user/notifications}" class="db-notif-btn" aria-label="Notifications">
                        <i class="fa-regular fa-bell"></i>
                        <span class="db-notif-badge" th:if="${notifCount > 0}" th:text="${notifCount}"></span>
                    </a>
                    <div class="db-avatar-sm" th:text="${member?.name != null ? #strings.substring(member.name,0,1).toUpperCase() : #strings.substring(userName,0,1).toUpperCase()}">U</div>
                </div>
            </header>

            <!-- ── Desktop Top Bar ── -->
            <header class="db-topbar">
                <!-- Search -->
                <form class="db-search" th:action="@{/user/books}" method="get">
                    <i class="fa-solid fa-magnifying-glass db-search-icon"></i>
                    <input type="text" name="search" placeholder="Search book name, author, edition ...">
                </form>

                <!-- Right side -->
                <div class="db-topbar-right">
                    <a th:href="@{/user/notifications}" class="db-notif-btn" aria-label="Notifications">
                        <i class="fa-regular fa-bell"></i>
                        <span class="db-notif-badge" th:if="${notifCount > 0}" th:text="${notifCount}"></span>
                    </a>
                    <div class="db-user-chip">
                        <div class="db-avatar">
                            <span th:text="${member?.name != null ? #strings.substring(member.name,0,1).toUpperCase() : #strings.substring(userName,0,1).toUpperCase()}">U</span>
                        </div>
                        <span class="db-username" th:text="${member?.name != null ? member.name : userName}">User</span>
                    </div>
                </div>
            </header>

            <!-- ── Page Content ── -->
            <div class="db-content">
                <!-- Page Header -->
                <div class="db-page-header">
                    <h1>Settings</h1>
                    <h3>Manage your profile details and account security</h3>
                </div>

                <div class="content" style="margin-bottom: 24px;">
                    <div th:if="${success}" class="alert alert-success"><i class="fa-solid fa-circle-check"></i> <span th:text="${success}"></span></div>
                    <div th:if="${error}" class="alert alert-error"><i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span></div>

                    <h2>Update Profile Details</h2>
                    <form th:action="@{/user/settings/update-profile}" method="post" style="max-width: 500px; margin-top: 15px;">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" th:value="${user.name}" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address (Cannot be changed)</label>
                            <input type="email" th:value="${user.email}" disabled>
                        </div>
                        <button type="submit" class="btn btn-success"><i class="fa-solid fa-floppy-disk"></i> Save Profile</button>
                    </form>
                </div>

                <div class="content">
                    <h2>Change Password</h2>
                    <form th:action="@{/user/settings/change-password}" method="post" style="max-width: 500px; margin-top: 15px;">
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" placeholder="Minimum 6 characters" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-type new password" required>
                        </div>
                        <button type="submit" class="btn btn-success"><i class="fa-solid fa-key"></i> Update Password</button>
                    </form>
                </div>
            </div>

        </main>

        <!-- ── Mobile Bottom Nav ── -->
        <nav class="db-bottom-nav">
            <a th:href="@{/user}" class="db-bnav"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a th:href="@{/user/books}" class="db-bnav"><i class="fa-solid fa-book"></i><span>Browse</span></a>
            <a th:href="@{/user/my-books}" class="db-bnav"><i class="fa-solid fa-book-open-reader"></i><span>My Books</span></a>
            <a th:href="@{/user/requests}" class="db-bnav"><i class="fa-solid fa-paper-plane"></i><span>Requests</span></a>
            <a th:href="@{/user/settings}" class="db-bnav active"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        </nav>

    </div>

    <script th:src="@{/js/sockjs.min.js}"></script>
    <script th:src="@{/js/stomp.min.js}"></script>
    <script th:src="@{/js/user.js(v='2.2')}"></script>
</body>
</html>
