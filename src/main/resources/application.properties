spring.application.name=Library_Mangement_system

server.port =8082

spring.datasource.url=jdbc:mysql://localhost:3306/library_management?createDatabaseIfNotExist=true

spring.datasource.username=root

spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=OFF

logging.level.org.hibernate.type.descriptor.sql=OFF
 
spring.sql.init.mode=always

spring.jpa.defer-datasource-initialization=true

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# JWT Configuration
# Secret key (at least 256-bit / 32 characters)
jwt.secret=lmsSecretKey123lmsSecretKey123lmsSecretKey123lmsSecretKey123
# Token expiration (24 hours in milliseconds)
jwt.expiration=86400000

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:437884890919-njnd3od28m07lde9e0k2802b4o80ja5d.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email