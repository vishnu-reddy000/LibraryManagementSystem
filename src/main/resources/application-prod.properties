spring.application.name=Library_Mangement_system

# Server Port (supports cloud environment variable overrides like PORT)
server.port=${PORT:8082}

# Database Datasource Config (supports environment variable overrides)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/library_management?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration for Production
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

# Production DB Initializations
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=false

# Thymeleaf configuration (Caching enabled for maximum performance)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=true

# ── CRITICAL: Trust Railway's reverse proxy so Spring uses https:// in redirect URIs ──
server.forward-headers-strategy=FRAMEWORK

# ── Google OAuth2 Configuration for Production ──
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:437884890919-njnd3od28m07lde9e0k2802b4o80ja5d.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=https://librarymanagementsystems.up.railway.app/login/oauth2/code/google

